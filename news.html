<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News & Events - St Elizabeth Integrated Academy</title>
<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f4f6f8;
}

/* TOP BAR */
.topbar{
  background:#1e3a5f;
  color:white;
  padding:15px;
  display:flex;
  align-items:center;
}

.menu-btn{
  font-size:26px;
  cursor:pointer;
  margin-right:15px;
}

/* SIDE DRAWER */
.drawer{
  position:fixed;
  left:-260px;
  top:0;
  width:260px;
  height:100%;
  background:#243a5e;
  padding-top:60px;
  transition:0.3s;
  z-index:1000;
}

.drawer button{
  width:85%;
  margin:10px auto;
  display:block;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#2f4d75;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.drawer button:hover{
  background:#3f6598;
}

/* MAIN CONTENT */
.content{
  padding:20px;
}

.school-title{
  text-align:center;
  font-size:24px;
  margin-top:10px;
  color:#1e3a5f;
}

.logo{
  display:block;
  margin:auto;
  max-width:140px;
  margin-top:10px;
  margin-bottom:20px;
}

/* News grid */
.news-grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap:15px;
}

.news-item{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.news-item h4{
  margin:0 0 8px 0;
  color:#1e3a5f;
}

.news-item p{
  margin:0;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <span class="menu-btn" onclick="openMenu()">☰</span>
  <b>St Elizabeth Integrated Academy</b>
</div>

<!-- SIDE MENU -->
<div id="drawer" class="drawer">
  <button onclick="goPage('index.html')">🏠 Home</button>
  <button onclick="goPage('about.html')">📘 About</button>
  <button onclick="goPage('admissions.html')">🎓 Admissions</button>
  <button onclick="goPage('academics.html')">📚 Academics</button>
  <button onclick="goPage('news.html')">📰 News & Events</button>
  <button onclick="goPage('gallery.html')">🖼 Gallery</button>
  <button onclick="goPage('contact.html')">☎ Contact</button>
  <button onclick="goPage('portal.html')">👨‍🎓 Student Portal</button>
</div>

<!-- MAIN CONTENT -->
<div class="content">
<h1 class="school-title">News & Events</h1>
<img id="schoolLogo" class="logo" src="images/logo.png">

<!-- Announcements -->
<div class="card">
  <h3>Announcements</h3>
  <div id="announcementsGrid" class="news-grid"></div>
</div>

<!-- Events -->
<div class="card">
  <h3>Events</h3>
  <div id="eventsGrid" class="news-grid"></div>
</div>

<!-- Newsletters -->
<div class="card">
  <h3>Newsletters</h3>
  <div id="newslettersGrid" class="news-grid"></div>
</div>

</div>

<script>
/* OPEN/CLOSE MENU */
function openMenu(){document.getElementById("drawer").style.left="0";}
function closeMenu(){document.getElementById("drawer").style.left="-260px";}
function goPage(page){closeMenu(); window.location.href=page;}

/* CLOSE MENU ON CLICK OUTSIDE */
document.addEventListener('click', function(e){
  const drawer = document.getElementById('drawer');
  if(!drawer.contains(e.target) && !e.target.classList.contains('menu-btn')){
    closeMenu();
  }
});

/* LOAD DATA */
let savedData = JSON.parse(localStorage.getItem("schoolData"));

if(savedData){
  const announcementsGrid = document.getElementById("announcementsGrid");
  const eventsGrid = document.getElementById("eventsGrid");
  const newslettersGrid = document.getElementById("newslettersGrid");

  (savedData.news.announcements||[]).forEach(item=>{
    let div = document.createElement('div');
    div.className='news-item';
    div.innerHTML=`<h4>Announcement</h4><p>${item}</p>`;
    announcementsGrid.appendChild(div);
  });

  (savedData.news.events||[]).forEach(item=>{
    let div = document.createElement('div');
    div.className='news-item';
    div.innerHTML=`<h4>Event</h4><p>${item}</p>`;
    eventsGrid.appendChild(div);
  });

  (savedData.news.newsletters||[]).forEach(item=>{
    let div = document.createElement('div');
    div.className='news-item';
    div.innerHTML=`<h4>Newsletter</h4><p>${item}</p>`;
    newslettersGrid.appendChild(div);
  });

  // Set logo if available
  if(savedData.home && savedData.home.logo){
    document.getElementById("schoolLogo").src=savedData.home.logo;
  }
}
</script>
</body>
</html>
